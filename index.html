<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTO · announcement board</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f4f7fc 0%, #eef2f6 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .prototype-wrapper {
            max-width: 1300px;
            width: 100%;
        }

        /* header & brand */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(4px);
            padding: 0.8rem 2rem;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(0,20,50,0.1);
        }

        .logo-area h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #003c8b, #0b5e8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-area span {
            font-size: 0.9rem;
            color: #1e4a6b;
            background: #d0e6ff;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            margin-left: 10px;
            font-weight: 500;
        }

        .auth-section {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: #0b2d4b;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: #0066b3;
            color: white;
            box-shadow: 0 8px 14px rgba(0,102,179,0.3);
        }

        .btn-primary:hover {
            background: #004b8f;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #b3c9e0;
        }

        .btn-outline:hover {
            background: #e3ecf5;
        }

        /* login panel (simulated) */
        .login-card {
            background: white;
            border-radius: 40px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 30px -10px rgba(0,60,120,0.2);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.7);
        }

        .login-card h3 {
            color: #003f6f;
            font-weight: 600;
            font-size: 1.3rem;
        }

        .login-input {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .login-input input {
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            border: 1px solid #bdd3eb;
            background: #f9fcff;
            min-width: 220px;
            font-size: 1rem;
        }

        .login-input input:focus {
            outline: 2px solid #0099ff;
        }

        .error-msg {
            color: #c6362e;
            font-weight: 500;
            margin-left: 10px;
        }

        /* admin panel */
        .admin-panel {
            background: white;
            border-radius: 40px;
            padding: 2rem 2rem 1.8rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 20px 30px -10px rgba(0,80,120,0.2);
            border: 1px solid #cbe5fe;
        }

        .admin-panel h2 {
            color: #103b5e;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.2rem;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-item label {
            font-weight: 600;
            color: #1d4e75;
            font-size: 0.9rem;
        }

        .form-item input, .form-item select, .form-item textarea {
            padding: 0.8rem 1rem;
            border-radius: 30px;
            border: 1px solid #c2d9f0;
            background: #f6faff;
            font-size: 0.95rem;
        }

        .form-item textarea {
            min-height: 80px;
            resize: vertical;
        }

        .post-btn {
            background: #0f7b3a;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 1rem 2.5rem;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 1.5rem;
            box-shadow: 0 8px 18px rgba(15,123,58,0.3);
            transition: 0.2s;
            cursor: pointer;
        }

        .post-btn:hover {
            background: #0b5f2d;
            transform: scale(1.02);
        }

        /* filter bar */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin: 1.8rem 0 2rem 0;
            background: rgba(255,255,255,0.6);
            padding: 1rem 2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: white;
            border: 1px solid #b9d2ec;
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            font-weight: 600;
            color: #1a4c74;
            cursor: pointer;
            transition: 0.1s;
        }

        .filter-btn.active {
            background: #0066b3;
            color: white;
            border-color: #0066b3;
            box-shadow: 0 6px 10px rgba(0,102,179,0.25);
        }

        .new-notification {
            background: #ffd966;
            color: #3d2f00;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
        }

        .new-notification i {
            font-size: 1.2rem;
        }

        /* announcement grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 1.8rem;
            margin-top: 1.5rem;
        }

        .announcement-card {
            background: white;
            border-radius: 32px;
            padding: 1.6rem 1.4rem 1.4rem 1.4rem;
            box-shadow: 0 15px 25px rgba(0,40,70,0.1);
            transition: 0.2s;
            border: 1px solid rgba(0,132,255,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .announcement-card.new-card {
            border-left: 8px solid #f4b836;
            background: #fefef9;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1rem;
        }

        .icon-image {
            font-size: 2.4rem;
            width: 55px;
            height: 55px;
            background: #e1f0ff;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0b5e8a;
        }

        .icon-image img {
            width: 45px;
            height: 45px;
            border-radius: 30px;
            object-fit: cover;
        }

        .title-date h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f2f4a;
        }

        .title-date .date {
            font-size: 0.8rem;
            color: #527a9c;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .category-tag {
            background: #dff0fe;
            color: #005c99;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            align-self: flex-start;
            margin-bottom: 0.8rem;
        }

        .description {
            color: #1f3d5a;
            line-height: 1.5;
            margin: 0.6rem 0 1.2rem 0;
            flex-grow: 1;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }

        .action-btn {
            background: none;
            border: 1px solid #bfd8f2;
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1d4e75;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-btn:hover {
            background: #e6f0ff;
            border-color: #0077be;
        }

        .action-btn.dismiss:hover {
            background: #ffe6e2;
            border-color: #c05a4b;
            color: #a13124;
        }

        .new-badge {
            background: #f4b836;
            color: #222;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            position: absolute;
            top: 1rem;
            right: 1.2rem;
        }

        .footer-note {
            margin-top: 3rem;
            color: #506e8c;
            font-size: 0.9rem;
            text-align: center;
        }

        /* responsive */
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .top-bar { flex-direction: column; gap: 15px; }
            .login-card { flex-direction: column; align-items: stretch; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
<div class="prototype-wrapper">
    <!-- top bar with simulated admin login -->
    <div class="top-bar">
        <div class="logo-area">
            <h1>📢 FUTO Bulletin <span>live</span></h1>
        </div>
        <div class="auth-section" id="authSection">
            <div id="loginStatusArea">
                <button class="btn" id="showLoginBtn"><i class="fas fa-lock"></i> Admin login</button>
            </div>
            <button class="btn-outline btn" id="logoutBtn" style="display: none;"><i class="fas fa-sign-out-alt"></i> logout</button>
        </div>
    </div>

    <!-- simulated login panel (hidden after login) -->
    <div id="loginPanel" class="login-card">
        <h3><i class="fas fa-user-shield" style="color:#0066b3;"></i> Admin simulation</h3>
        <div class="login-input">
            <input type="password" id="adminPass" placeholder="enter password (futo123)" value="">
            <button class="btn-primary btn" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> Login</button>
        </div>
        <div id="loginError" class="error-msg"></div>
        <div style="font-size:0.85rem; color:#4f7ea3;">use any password · just simulation</div>
    </div>

    <!-- admin panel (visible only after login) -->
    <div id="adminPanel" class="admin-panel hidden">
        <h2><i class="fas fa-pen-to-square" style="color:#0f7b3a;"></i> Post new announcement</h2>
        <div class="form-grid">
            <div class="form-item">
                <label>Title</label>
                <input type="text" id="titleInput" placeholder="e.g. Exam schedule">
            </div>
            <div class="form-item">
                <label>Category</label>
                <select id="categorySelect">
                    <option value="academic">📚 Academic</option>
                    <option value="hostel">🏠 Hostel</option>
                    <option value="events">🎉 Events</option>
                </select>
            </div>
            <div class="form-item">
                <label>Image URL (optional)</label>
                <input type="text" id="imageInput" placeholder="https://... or leave empty">
            </div>
            <div class="form-item" style="grid-column: span 2;">
                <label>Description</label>
                <textarea id="descInput" placeholder="Full announcement details..."></textarea>
            </div>
        </div>
        <button class="post-btn" id="postAnnouncementBtn"><i class="fas fa-cloud-upload-alt"></i> Publish announcement</button>
    </div>

    <!-- filter + new notification area -->
    <div class="filter-bar">
        <div class="filter-buttons" id="filterButtons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="academic">📘 Academic</button>
            <button class="filter-btn" data-filter="hostel">🏠 Hostel</button>
            <button class="filter-btn" data-filter="events">🎭 Events</button>
        </div>
        <div id="newNotificationBanner" class="new-notification hidden">
            <i class="fas fa-circle-exclamation"></i>
            <span id="newCount">0</span> new announcement(s)
            <button class="btn-outline btn" id="markAllReadBtn" style="background:white;">✓ Mark all read</button>
        </div>
    </div>

    <!-- announcements grid -->
    <div id="announcementsContainer" class="cards-grid">
        <!-- dynamic cards render here -->
    </div>
    <div class="footer-note">
        <i class="fas fa-graduation-cap"></i> Federal University of Technology, Owerri — interactive demo
    </div>
</div>

<script>
    (function() {
        // ---------- simulated data ----------
        let announcements = [
            { id: 1001, title: 'Lecture Hall Closure', description: 'The main lecture hall will be closed for maintenance on Saturday, March 15th.', date: '2025-03-15 10:30', category: 'academic', imageUrl: '', isNew: false },
            { id: 1002, title: 'Hostel Water Supply', description: 'Water supply will be interrupted from 10am to 2pm tomorrow (hostels A & B).', date: '2025-03-14 08:15', category: 'hostel', imageUrl: '', isNew: false },
            { id: 1003, title: 'Cultural Day Event', description: 'Join us for cultural day activities at the amphitheater. Friday 2pm.', date: '2025-03-20 12:00', category: 'events', imageUrl: '', isNew: false }
        ];

        // state
        let currentFilter = 'all';
        let adminLoggedIn = false;
        const dismissedIds = new Set();          // IDs hidden by dismiss
        // new announcements are flagged by isNew (true when posted after page load)

        // ---------- helper functions ----------
        function generateId() { return Date.now() + Math.floor(Math.random()*1000); }

        function formatDate(dateObj) {
            return dateObj.toLocaleString('en-NG', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
        }

        // render everything
        function renderAnnouncements() {
            const container = document.getElementById('announcementsContainer');
            const filter = currentFilter;
            let filtered = announcements.filter(a => !dismissedIds.has(a.id));

            if (filter !== 'all') {
                filtered = filtered.filter(a => a.category === filter);
            }

            let html = '';
            filtered.forEach(ann => {
                const newClass = ann.isNew ? 'new-card' : '';
                const iconHtml = ann.imageUrl 
                    ? `<img src="${ann.imageUrl}" alt="img" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\\'fas fa-image\\' style=\\'font-size:2rem;\\'></i>';">` 
                    : `<i class="fas ${ann.category === 'academic' ? 'fa-book' : (ann.category === 'hostel' ? 'fa-bed' : 'fa-calendar-alt')}"></i>`;
                const newBadge = ann.isNew ? '<span class="new-badge"><i class="fas fa-star"></i> NEW</span>' : '';

                html += `
                    <div class="announcement-card ${newClass}" data-id="${ann.id}">
                        ${newBadge}
                        <div class="card-header">
                            <div class="icon-image">${iconHtml}</div>
                            <div class="title-date">
                                <h3>${ann.title}</h3>
                                <div class="date"><i class="far fa-clock"></i> ${ann.date}</div>
                            </div>
                        </div>
                        <div class="category-tag"><i class="fas fa-tag"></i> ${ann.category}</div>
                        <div class="description">${ann.description}</div>
                        <div class="card-actions">
                            <button class="action-btn mark-read" data-id="${ann.id}"><i class="fas fa-check-circle"></i> Mark read</button>
                            <button class="action-btn dismiss" data-id="${ann.id}"><i class="fas fa-eye-slash"></i> Dismiss</button>
                        </div>
                    </div>
                `;
            });

            if (filtered.length === 0) {
                html = `<div style="grid-column:1/-1; text-align:center; padding:4rem; background:white; border-radius:60px; color:#3b6991;"><i class="fas fa-inbox fa-3x"></i><p style="margin-top:1rem;">No announcements in this category</p></div>`;
            }

            container.innerHTML = html;

            // update new notification banner
            const newAnnouncementsCount = announcements.filter(a => !dismissedIds.has(a.id) && a.isNew).length;
            const banner = document.getElementById('newNotificationBanner');
            const newCountSpan = document.getElementById('newCount');
            if (newAnnouncementsCount > 0) {
                banner.classList.remove('hidden');
                newCountSpan.textContent = newAnnouncementsCount;
            } else {
                banner.classList.add('hidden');
            }

            // highlight active filter
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === currentFilter);
            });
        }

        // mark an announcement as read (set isNew false)
        function markAsRead(id) {
            const ann = announcements.find(a => a.id === id);
            if (ann) {
                ann.isNew = false;
                renderAnnouncements();
            }
        }

        // dismiss (hide)
        function dismissAnnouncement(id) {
            dismissedIds.add(id);
            renderAnnouncements();
        }

        // mark all new as read
        function markAllRead() {
            announcements.forEach(a => { a.isNew = false; });
            renderAnnouncements();
        }

        // admin post
        function postAnnouncement() {
            const title = document.getElementById('titleInput').value.trim();
            const desc = document.getElementById('descInput').value.trim();
            const category = document.getElementById('categorySelect').value;
            const imageUrl = document.getElementById('imageInput').value.trim();

            if (!title || !desc) {
                alert('Please fill at least title and description');
                return;
            }

            const newAnn = {
                id: generateId(),
                title: title,
                description: desc,
                date: formatDate(new Date()),
                category: category,
                imageUrl: imageUrl || '',
                isNew: true,
            };
            announcements.push(newAnn);
            // clear form
            document.getElementById('titleInput').value = '';
            document.getElementById('descInput').value = '';
            document.getElementById('imageInput').value = '';
            renderAnnouncements();
        }

        // ---------- event listeners ----------
        document.addEventListener('DOMContentLoaded', () => {
            renderAnnouncements();

            // login simulation
            const loginPanel = document.getElementById('loginPanel');
            const adminPanel = document.getElementById('adminPanel');
            const logoutBtn = document.getElementById('logoutBtn');
            const showLoginBtn = document.getElementById('showLoginBtn');
            const loginBtn = document.getElementById('loginBtn');
            const passInput = document.getElementById('adminPass');
            const loginError = document.getElementById('loginError');

            showLoginBtn.addEventListener('click', () => {
                loginPanel.classList.toggle('hidden');
            });

            loginBtn.addEventListener('click', () => {
                // simulate any password (accept anything) – but for demo we just show admin
                // optional "futo123" hint, but any works (simulation)
                const pwd = passInput.value;
                if (pwd.length > 0) {   // any non-empty simulates successful login
                    adminLoggedIn = true;
                    loginPanel.classList.add('hidden');
                    adminPanel.classList.remove('hidden');
                    logoutBtn.style.display = 'inline-flex';
                    showLoginBtn.style.display = 'none';
                    loginError.textContent = '';
                } else {
                    loginError.textContent = '❌ type anything to simulate login';
                }
                passInput.value = '';
            });

            logoutBtn.addEventListener('click', () => {
                adminLoggedIn = false;
                adminPanel.classList.add('hidden');
                logoutBtn.style.display = 'none';
                showLoginBtn.style.display = 'inline-flex';
                loginPanel.classList.remove('hidden');   // show login again
            });

            // post button
            document.getElementById('postAnnouncementBtn').addEventListener('click', postAnnouncement);

            // filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    currentFilter = e.target.dataset.filter;
                    renderAnnouncements();
                });
            });

            // mark all read
            document.getElementById('markAllReadBtn').addEventListener('click', markAllRead);

            // event delegation for card actions (mark-read, dismiss)
            document.getElementById('announcementsContainer').addEventListener('click', (e) => {
                const target = e.target.closest('button');
                if (!target) return;
                const card = target.closest('.announcement-card');
                if (!card) return;
                const id = Number(card.dataset.id);

                if (target.classList.contains('mark-read')) {
                    markAsRead(id);
                } else if (target.classList.contains('dismiss')) {
                    dismissAnnouncement(id);
                }
            });
        });
    })();
</script>

<!-- small style for fallback images -->
</body>
</html>
